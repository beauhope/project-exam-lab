<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>التحقق من بنك الأسئلة</title><link rel="stylesheet" href="../assets/css/styles.css"></head><body><header class="site-header"><nav class="nav"><a class="brand" href="../index.html">محاكي إدارة المشاريع الاحترافي</a></nav></header><main class="container"><h1>تقرير التحقق من بنك الأسئلة</h1><div id="validation-status" class="notice" aria-live="polite">جارٍ التحقق…</div><div id="validation-report"></div></main><script type="module">import{validateQuestionBank}from'../assets/js/questions-loader.js';const status=document.querySelector('#validation-status'),root=document.querySelector('#validation-report');try{const res=await fetch('../data/questions.json'),bank=await res.json(),r=validateQuestionBank(bank);status.className=`notice ${r.valid?'':'error'}`;status.textContent=r.valid?'✓ بنك الأسئلة سليم':'✕ توجد أخطاء في بنك الأسئلة';const table=(title,obj)=>`<section class="panel"><h2>${title}</h2><table><tbody>${Object.entries(obj).map(([k,v])=>`<tr><th>${k}</th><td>${v}</td></tr>`).join('')}</tbody></table></section>`;root.innerHTML=`<section class="grid"><div class="metric"><strong>${r.stats.total}</strong>إجمالي الأسئلة</div><div class="metric"><strong>${r.details.duplicates.length}</strong>معرفات مكررة</div><div class="metric"><strong>${r.details.missingExplanations.length}</strong>بلا تفسير</div><div class="metric"><strong>${r.details.missingAnswers.length}</strong>بلا إجابة صحيحة</div><div class="metric"><strong>${r.details.badCaseRefs.length}</strong>مراجع حالة غير صحيحة</div></section>${table('حسب المجال',r.stats.domains)}${table('حسب المنهج',r.stats.approaches)}${table('حسب الصعوبة',r.stats.difficulties)}${table('حسب النوع',r.stats.types)}<section class="panel"><h2>التفاصيل</h2><p><strong>الأخطاء:</strong> ${r.errors.join('؛ ')||'لا توجد'}</p><p><strong>التحذيرات:</strong> ${r.warnings.join('؛ ')||'لا توجد'}</p></section>`}catch(e){console.error(e);status.className='notice error';status.textContent='تعذر تحميل ملف البيانات للتحقق منه.'}</script></body></html>
