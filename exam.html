<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0d5c63"><title>الاختبار | محاكي إدارة المشاريع الاحترافي</title><link rel="stylesheet" href="./assets/css/styles.css"><script src="./assets/js/includes.js" defer></script></head><body data-page="exam" data-layout="exam"><div id="site-header"></div><section class="exam-header" aria-label="حالة الاختبار"><div class="exam-top"><div><strong id="question-number">تحميل الاختبار…</strong><div class="progress-track" role="progressbar" aria-label="تقدم الاختبار" aria-valuemin="1" aria-valuemax="180"><div class="progress-bar" id="progress-bar"></div></div><small id="data-status" aria-live="polite">جارٍ تحميل البيانات…</small></div><div class="timer-wrap"><small>الوقت المتبقي</small><div class="timer" id="timer">00:00:00</div></div><button class="btn btn-danger end-exam" id="end-exam" type="button">إنهاء الاختبار</button></div></section><main id="main-content" class="exam-layout"><article class="question-card"><div class="question-meta"><span class="tag" id="question-type"></span><span id="question-meta"></span></div><div class="case-box" id="case-box" hidden></div><h1 class="prompt" id="prompt"></h1><div data-answer-area></div><div class="exam-actions"><div class="action-group"><button class="btn btn-secondary" id="previous" type="button">السابق</button><button class="btn btn-primary" id="next" type="button">التالي</button></div><div class="action-group"><button class="btn btn-ghost" id="flag-button" type="button">☆ تعليم للمراجعة</button><button class="btn btn-ghost" id="clear-answer" type="button">إزالة الإجابة</button></div></div></article><button class="btn btn-secondary sidebar-toggle" id="sidebar-toggle" type="button" aria-controls="question-sidebar" aria-expanded="false">خريطة الأسئلة</button><aside class="panel sidebar" id="question-sidebar"><div class="sidebar-title"><h2>خريطة الأسئلة</h2><button cl
