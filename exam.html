<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0d5c63"><title>الاختبار | محاكي إدارة المشاريع الاحترافي</title><link rel="stylesheet" href="./assets/css/styles.css"></head><body data-page="exam"><a class="skip-link" href="#exam-main">انتقل إلى السؤال</a><header class="exam-header"><div class="exam-top"><div><strong id="question-number">تحميل الاختبار…</strong><div class="progress-track" role="progressbar" aria-label="تقدم الاختبار" aria-valuemin="1" aria-valuemax="180"><div class="progress-bar" id="progress-bar"></div></div><small id="data-status" aria-live="polite">جارٍ الاتصال بالبيانات…</small></div><div class="timer" id="timer" aria-label="الوقت المتبقي">00:00:00</div><button class="btn btn-danger end-exam" id="end-exam" type="button">إنهاء الاختبار</button></div></header>
<main id="exam-main" class="exam-layout"><article class="question-card"><div class="question-meta"><span class="tag" id="question-type"></span><span id="question-meta"></span></div><div class="case-box" id="case-box" hidden></div><h1 class="prompt" id="prompt"></h1><div data-answer-area></div><div class="exam-actions"><div class="action-group"><button class="btn btn-secondary" id="previous" type="button">السابق</button><button class="btn btn-primary" id="next" type="button">التالي</button></div><div class="action-group"><button class="btn btn-ghost" id="flag-button" type="button">☆ تعليم للمراجعة</button><button class="btn btn-ghost" id="clear-answer" type="button">إزالة الإجابة</button></div></div></article><aside class="panel sidebar"><h2>خريطة الأسئلة</h2><p>المجاب: <strong id="answered-count">0</strong> • للمراجعة: <strong id="flagged-count">0</strong></p><div class="question-grid" id="question-grid"></div></aside></main>
<div class="break-overlay" id="break-overlay" hidden><div class="break-box"><h2>استراحة اختيارية</h2><p>أُغلق القسم السابق ولن تتمكن من العودة إليه بعد المتابعة.</p><div class="break-time" id="break-time">10:00</div><button class="btn btn-primary" id="continue-break" type="button">متابعة الآن</button></div></div>
<dialog id="submit-dialog"><h2>تأكيد التسليم</h2><p id="confirm-text"></p><div class="action-group"><button class="btn btn-secondary" type="button" onclick="this.closest('dialog').close()">إلغاء</button><button class="btn btn-danger" id="confirm-submit" type="button">تسليم الاختبار</button></div></dialog><div class="live-region" aria-live="polite" data-live></div><script type="module" src="./assets/js/app.js"></script><script type="module">import{initExam}from'./assets/js/exam.js';initExam();</script></body></html>
